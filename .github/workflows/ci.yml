name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run typecheck
      - name: Game boundary (no game strings outside games/ and vscode/)
        run: node scripts/check-game-boundary.mjs
      - run: pnpm test
      - run: pnpm run compile
      - name: Package (vsix)
        working-directory: packages/vscode
        run: npx vsce package --allow-missing-repository --no-dependencies
      - name: Build server tarball
        run: node scripts/build-server-tarball.mjs
