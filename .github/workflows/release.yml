# Release pipeline. Two entry points:
#
#  - Push a tag `v*` (e.g. v0.1.0): builds, tests, packages the vsix and
#    attaches it to a GitHub Release. No Marketplace interaction.
#  - Run the workflow manually with "publish" checked: additionally publishes
#    the vsix to the VS Code Marketplace. Needs the VSCE_PAT repo secret
#    (Azure DevOps PAT with Marketplace > Manage scope) — see AGENTS.md
#    "Releasing".
#
# The "prerelease" input controls the Marketplace pre-release flag (alpha/beta
# channel users must opt in inside VS Code). Keep it on until 1.0.
name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish to the VS Code Marketplace"
        type: boolean
        default: false
      prerelease:
        description: "Mark as pre-release (alpha/beta channel)"
        type: boolean
        default: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub Release
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm typecheck

      # Corpus-gated tests skip automatically (no game files in CI).
      - run: pnpm test

      - run: pnpm run compile

      # Everything in the package's dist/ ships in the vsix; stray bundles must not.
      - run: rm -f packages/vscode/dist/*.cjs

      - name: Package vsix
        working-directory: packages/vscode
        run: |
          FLAG=""
          if [ "${{ github.event_name }}" = "push" ] || [ "${{ inputs.prerelease }}" = "true" ]; then FLAG="--pre-release"; fi
          npx vsce package $FLAG --no-dependencies

      - uses: actions/upload-artifact@v4
        with:
          name: vsix
          path: "packages/vscode/*.vsix"

      - name: GitHub Release (tag builds)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: "packages/vscode/*.vsix"
          prerelease: true
          generate_release_notes: true

      - name: Publish to Marketplace
        if: github.event_name == 'workflow_dispatch' && inputs.publish
        working-directory: packages/vscode
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          FLAG=""
          if [ "${{ inputs.prerelease }}" = "true" ]; then FLAG="--pre-release"; fi
          npx vsce publish $FLAG --no-dependencies --packagePath *.vsix
