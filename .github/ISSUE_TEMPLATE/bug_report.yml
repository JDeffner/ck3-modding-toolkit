name: Bug report
description: Something misbehaves in the editor
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened / what you expected
      description: A clear description of the problem and the behavior you expected instead.
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Where does the problem show up?
      options:
        - Diagnostics / validation
        - Hover cards / completions
        - ck3-tiger integration
        - Workspace mods / multi-mod
        - Translation mods
        - Views / Tools panel
        - Performance
        - Other / not sure
    validations:
      required: true

  - type: input
    id: extension-version
    attributes:
      label: Extension version
      placeholder: e.g. 0.1.1
    validations:
      required: true

  - type: dropdown
    id: editor
    attributes:
      label: Editor
      options:
        - VS Code
        - Cursor
        - VSCodium
        - Windsurf
        - Other (say which under "Anything else")
    validations:
      required: true

  - type: input
    id: ck3-version
    attributes:
      label: CK3 game version
      description: Matters — the extension derives data per game patch.
      placeholder: e.g. 1.16.2
    validations:
      required: true

  - type: input
    id: tiger-version
    attributes:
      label: ck3-tiger version
      description: Output of `ck3-tiger --version`, or "auto-downloaded", or "not used".
      placeholder: e.g. 1.11.1 / auto-downloaded / not used

  - type: checkboxes
    id: data-sources
    attributes:
      label: Data sources
      options:
        - label: '`script_docs` logs generated (status bar says "script_docs + wiki")'
        - label: '`DumpDataTypes` dump loaded (`data_types.log` in the logs folder)'
        - label: Using a `.ck3modding/schema.json` overlay or `playset.json` (attach it below if so)

  - type: textarea
    id: repro
    attributes:
      label: Snippet / repro
      description: If a specific file confuses the parser or diagnostics, paste the smallest snippet that reproduces it.
      render: text

  - type: textarea
    id: extra
    attributes:
      label: Anything else
      description: Logs, screenshots, schema overlay, playset.json, or other context.
